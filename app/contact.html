<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — ShopLab</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand">ShopLab</a>
    <ul class="nav-links">
      <li><a href="index.html">Shop</a></li>
      <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1>Contact Us</h1>
    <p>Have a question or feedback? We'd love to hear from you.</p>

    <form id="contact-form" class="contact-form">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="How can we help?" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>

    <div id="form-success" class="hidden success-banner">
      <p>Thanks! Your message has been sent. We'll be in touch shortly.</p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 ShopLab. All rights reserved.</p>
  </footer>

  <script src="js/products.js"></script>
  <!-- BUG: form submission handler has a bug — it shows success but never actually
       validates or sends the message field. The message field value is ignored. -->
  <script src="js/contact.js"></script>
</body>
</html>
